<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Co-occurrence Graph -- GitHub Developer Ecosystem Analytics</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    /* -----------------------------------------------------------------------
       VIZ-06: PMI Force-Directed Language Co-occurrence Graph
       Author: Vikram Markali (vrm9190)

       Reads /tmp/viz05_pmi_graph.json generated by viz05_pmi_cooccurrence.py
       To serve locally:
         python -m http.server 8888
         open http://localhost:8888/analytics/viz06_pmi_graph.html

       Or embed in Grafana via a Text panel with an <iframe> pointing to the
       URL of the Python HTTP server running inside the container.
    ----------------------------------------------------------------------- */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(13, 17, 23, 0.92);
      border-bottom: 1px solid #30363d;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f0f6fc;
      white-space: nowrap;
    }

    #stats {
      font-size: 12px;
      color: #8b949e;
      white-space: nowrap;
    }

    #controls {
      display: flex;
      gap: 12px;
      margin-left: auto;
      align-items: center;
    }

    #controls label {
      font-size: 12px;
      color: #8b949e;
    }

    #controls input[type=range] {
      width: 90px;
      accent-color: #388bfd;
    }

    #search {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 12px;
      padding: 4px 8px;
      outline: none;
      width: 160px;
    }
    #search:focus { border-color: #388bfd; }

    svg {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 200;
      min-width: 180px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #tooltip strong { color: #f0f6fc; font-size: 13px; }
    #tooltip .stat  { color: #8b949e; margin-top: 3px; }
    #tooltip .stat span { color: #c9d1d9; }

    /* Legend */
    #legend {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(22, 27, 34, 0.9);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 11px;
      z-index: 100;
    }
    #legend h3 { font-size: 11px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; color: #c9d1d9; }
    .legend-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>

<div id="header">
  <h1>Language Co-occurrence Graph</h1>
  <div id="stats">Loading...</div>
  <div id="controls">
    <label>PMI cutoff <input type="range" id="pmi-slider" min="0" max="5" step="0.1" value="0"></label>
    <label>Min co-occ <input type="range" id="coocc-slider" min="0" max="5000" step="100" value="0"></label>
    <input type="text" id="search" placeholder="Search language..." />
  </div>
</div>

<svg id="graph"></svg>
<div id="tooltip"></div>

<div id="legend">
  <h3>Language Ecosystem</h3>
  <div class="legend-item"><div class="legend-dot" style="background:#f78166"></div>Systems (C, C++, Rust, Go)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#388bfd"></div>Web (JS, TS, HTML, CSS)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div>Data/ML (Python, R, Julia)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d2a8ff"></div>JVM (Java, Kotlin, Scala)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffa657"></div>Mobile (Swift, Dart)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8b949e"></div>Other</div>
  <br/>
  <div style="color:#8b949e">Node size = actor count</div>
  <div style="color:#8b949e">Edge width = PMI score</div>
</div>

<script>
// ---------------------------------------------------------------------------
// Language ecosystem color classification
// ---------------------------------------------------------------------------
const ECOSYSTEM_COLORS = {
  systems: { langs: ["C", "C++", "Rust", "Go", "Assembly", "Zig", "Nim"], color: "#f78166" },
  web:     { langs: ["JavaScript", "TypeScript", "HTML", "CSS", "PHP", "Ruby", "Svelte", "Vue"], color: "#388bfd" },
  data:    { langs: ["Python", "R", "Julia", "Jupyter Notebook", "MATLAB", "Scala"], color: "#3fb950" },
  jvm:     { langs: ["Java", "Kotlin", "Groovy", "Clojure", "Scala"], color: "#d2a8ff" },
  mobile:  { langs: ["Swift", "Objective-C", "Dart", "Kotlin"], color: "#ffa657" },
};

function getColor(lang) {
  for (const [, { langs, color }] of Object.entries(ECOSYSTEM_COLORS)) {
    if (langs.includes(lang)) return color;
  }
  return "#8b949e";
}

// ---------------------------------------------------------------------------
// Main visualization
// ---------------------------------------------------------------------------
const DATA_URL = "viz05_pmi_graph.json";

const svg    = d3.select("#graph");
const width  = window.innerWidth;
const height = window.innerHeight;
const tooltip = document.getElementById("tooltip");

// Container group for zoom/pan
const g = svg.append("g");

// Zoom behavior
svg.call(
  d3.zoom()
    .scaleExtent([0.2, 6])
    .on("zoom", (event) => g.attr("transform", event.transform))
);

let allNodes = [], allLinks = [];
let simulation;

d3.json(DATA_URL).then(data => {
  allNodes = data.nodes;
  allLinks = data.links;

  document.getElementById("stats").textContent =
    `${allNodes.length} languages  |  ${allLinks.length} co-occurrence pairs`;

  render(allNodes, allLinks);
  setupControls();
}).catch(err => {
  document.getElementById("stats").textContent =
    "Error loading viz05_pmi_graph.json -- run viz05_pmi_cooccurrence.py first";
  console.error(err);
});

function render(nodes, links) {
  // Clear previous render
  g.selectAll("*").remove();
  if (simulation) simulation.stop();

  const nodeById = new Map(nodes.map(n => [n.id, n]));

  // Resolve source/target to objects
  const resolvedLinks = links
    .filter(l => nodeById.has(l.source) && nodeById.has(l.target))
    .map(l => ({
      ...l,
      source: nodeById.get(l.source),
      target: nodeById.get(l.target),
    }));

  simulation = d3.forceSimulation(nodes)
    .force("link",   d3.forceLink(resolvedLinks).id(d => d.id).distance(d => 120 / (d.pmi_score + 0.5)))
    .force("charge", d3.forceManyBody().strength(-180))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collide", d3.forceCollide(d => d.radius + 8))
    .alphaDecay(0.02);

  // Edges
  const link = g.append("g")
    .selectAll("line")
    .data(resolvedLinks)
    .join("line")
    .attr("stroke", "#30363d")
    .attr("stroke-opacity", 0.7)
    .attr("stroke-width", d => Math.max(0.5, d.thickness || 1));

  // Nodes
  const node = g.append("g")
    .selectAll("g")
    .data(nodes)
    .join("g")
    .attr("cursor", "grab")
    .call(
      d3.drag()
        .on("start", (event, d) => {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on("drag",  (event, d) => { d.fx = event.x; d.fy = event.y; })
        .on("end",   (event, d) => {
          if (!event.active) simulation.alphaTarget(0);
          d.fx = null; d.fy = null;
        })
    );

  // Circle
  node.append("circle")
    .attr("r", d => d.radius || 8)
    .attr("fill", d => getColor(d.id))
    .attr("fill-opacity", 0.85)
    .attr("stroke", d => d3.color(getColor(d.id)).darker(0.8))
    .attr("stroke-width", 1.5);

  // Label
  node.append("text")
    .text(d => d.id)
    .attr("text-anchor", "middle")
    .attr("dy", d => (d.radius || 8) + 13)
    .attr("font-size", d => Math.max(9, Math.min(13, (d.radius || 8) * 0.7)) + "px")
    .attr("fill", "#c9d1d9")
    .attr("pointer-events", "none");

  // Tooltip
  node
    .on("mouseenter", (event, d) => {
      const connectedLinks = resolvedLinks.filter(
        l => l.source.id === d.id || l.target.id === d.id
      );
      const topPairs = connectedLinks
        .sort((a, b) => b.pmi_score - a.pmi_score)
        .slice(0, 5)
        .map(l => {
          const partner = l.source.id === d.id ? l.target.id : l.source.id;
          return `<div class="stat">${partner}: <span>PMI ${l.pmi_score.toFixed(2)}</span></div>`;
        }).join("");

      tooltip.innerHTML = `
        <strong>${d.id}</strong>
        <div class="stat">Contributors: <span>${d.actor_count?.toLocaleString() ?? "n/a"}</span></div>
        <div class="stat">Edges: <span>${connectedLinks.length}</span></div>
        ${topPairs ? "<div class='stat' style='margin-top:6px;color:#8b949e'>Top pairs:</div>" + topPairs : ""}
      `;
      tooltip.style.opacity = 1;
    })
    .on("mousemove", (event) => {
      tooltip.style.left  = (event.clientX + 15) + "px";
      tooltip.style.top   = (event.clientY - 10) + "px";
    })
    .on("mouseleave", () => { tooltip.style.opacity = 0; });

  // Edge tooltip
  link
    .on("mouseenter", (event, d) => {
      tooltip.innerHTML = `
        <strong>${d.source.id} + ${d.target.id}</strong>
        <div class="stat">PMI score: <span>${d.pmi_score.toFixed(4)}</span></div>
        <div class="stat">Co-occurrences: <span>${d.cooccurrence?.toLocaleString() ?? "n/a"}</span></div>
      `;
      tooltip.style.opacity = 1;
    })
    .on("mousemove", (event) => {
      tooltip.style.left  = (event.clientX + 15) + "px";
      tooltip.style.top   = (event.clientY - 10) + "px";
    })
    .on("mouseleave", () => { tooltip.style.opacity = 0; });

  simulation.on("tick", () => {
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });
}

function setupControls() {
  const pmiSlider  = document.getElementById("pmi-slider");
  const cooccSlider = document.getElementById("coocc-slider");
  const search     = document.getElementById("search");

  function applyFilters() {
    const minPmi   = parseFloat(pmiSlider.value);
    const minCoocc = parseInt(cooccSlider.value);
    const query    = search.value.toLowerCase().trim();

    const filteredLinks = allLinks.filter(l =>
      (l.pmi_score  >= minPmi) &&
      (l.cooccurrence >= minCoocc)
    );

    // Keep only nodes that appear in filtered links OR match search
    const activeIds = new Set();
    filteredLinks.forEach(l => {
      const src = typeof l.source === "object" ? l.source.id : l.source;
      const tgt = typeof l.target === "object" ? l.target.id : l.target;
      activeIds.add(src);
      activeIds.add(tgt);
    });

    let filteredNodes = allNodes.filter(n => activeIds.has(n.id));

    if (query) {
      const match = allNodes.filter(n => n.id.toLowerCase().includes(query));
      match.forEach(n => activeIds.add(n.id));
      filteredNodes = allNodes.filter(n => activeIds.has(n.id));
    }

    render(filteredNodes, filteredLinks);

    document.getElementById("stats").textContent =
      `${filteredNodes.length} languages  |  ${filteredLinks.length} pairs  (PMI >= ${minPmi}, co-occ >= ${minCoocc})`;
  }

  pmiSlider.addEventListener("input",   applyFilters);
  cooccSlider.addEventListener("input", applyFilters);
  search.addEventListener("input",      applyFilters);
}
</script>
</body>
</html>
